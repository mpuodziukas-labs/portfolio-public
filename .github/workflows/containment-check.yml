name: containment-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Structural gates only. Semantic leak-regex scanning runs pre-push locally.
# Rationale: a public denylist reveals everything it denies. Structure is safe
# to publish (path allowlist, size cap, manifest) — stack-specific patterns
# stay local-only.

jobs:
  containment:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Path blacklist
        run: |
          set -e
          BLACKLIST='^(dotfiles/|home/|\.env)'
          hits=$(git ls-files | grep -E "$BLACKLIST" || true)
          if [ -n "$hits" ]; then
            echo "::error::Paths outside repo scope:"
            echo "$hits"
            exit 1
          fi
          echo "paths: clean"

      - name: File size cap (2 MB)
        run: |
          set -e
          hits=$(find . -type f -not -path './.git/*' -size +2M || true)
          if [ -n "$hits" ]; then
            echo "::error::Files over 2MB:"
            echo "$hits"
            exit 1
          fi
          echo "size: clean"

      - name: Manifest whitelist
        run: |
          set -e
          ALLOWED='^(README\.md|LICENSE|\.gitignore|\.github/|portfolio/|projects/|public/|resume\.md|resume\.html)'
          violations=$(git ls-files | grep -vE "$ALLOWED" || true)
          if [ -n "$violations" ]; then
            echo "::error::Files outside manifest:"
            echo "$violations"
            exit 1
          fi
          echo "manifest: clean"

      - name: Generic secret scan
        run: |
          set -e
          SECRET_RE='(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|xoxb-[0-9]+-[0-9]+|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)'
          hits=$(git grep -E "$SECRET_RE" || true)
          if [ -n "$hits" ]; then
            echo "::error::Secret pattern match"
            exit 1
          fi
          echo "secrets: clean"

      - name: Summary
        run: echo "containment-check PASS"
